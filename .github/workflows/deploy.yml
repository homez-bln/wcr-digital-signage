name: Deploy to IONOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH + rsync
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.FTP_SERVER }}
          REMOTE_USER: ${{ secrets.FTP_USERNAME }}
          REMOTE_PORT: 22
          SOURCE: "wcr-digital-signage/"
          TARGET: "/wp-content/plugins/wcr-digital-signage/"
          EXCLUDE: ".git, .github, .gitignore, README.md"
          SCRIPT_BEFORE: |
            mkdir -p /wp-content/plugins/wcr-digital-signage
          ARGS: "-avz --delete"
