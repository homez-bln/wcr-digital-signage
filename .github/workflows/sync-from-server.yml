name: Sync from IONOS Server (FTP)

on:
  workflow_dispatch:

jobs:
  sync-from-server:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp
      
      - name: Test FTP Connection
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          echo "Testing FTP connection to: $FTP_SERVER"
          echo "Username: $FTP_USERNAME"
          
          # Test verschiedene Verbindungstypen
          echo "=== Test 1: FTPS (explicit) ==="
          lftp -e "set ssl:verify-certificate no; set ftp:ssl-allow yes; set ftp:ssl-force yes; open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER; ls; bye" || echo "FTPS failed"
          
          echo ""
          echo "=== Test 2: FTP (plain) ==="
          lftp -e "open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER; ls; bye" || echo "Plain FTP failed"
          
          echo ""
          echo "=== Test 3: SFTP ==="
          lftp -e "open sftp://$FTP_USERNAME:$FTP_PASSWORD@$FTP_SERVER; ls; bye" || echo "SFTP failed"
      
      - name: Download from FTP Server
        if: false  # Erstmal deaktiviert bis Verbindung funktioniert
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          mkdir -p /tmp/server-backup
          
          lftp -e "
            set ssl:verify-certificate no;
            set ftp:ssl-allow yes;
            set ftp:ssl-force yes;
            set net:timeout 30;
            set net:max-retries 3;
            open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER;
            cd /wcr-digital-signage || cd /html/wcr-digital-signage || cd wcr-digital-signage;
            pwd;
            mirror --verbose \
              --exclude .git/ \
              --exclude .github/ \
              --exclude node_modules/ \
              --exclude wp-content/uploads/ \
              --exclude .env \
              . /tmp/server-backup;
            bye
          "
      
      - name: Sync to Repository
        if: false
        run: |
          git reset --hard HEAD
          find . -mindepth 1 -maxdepth 1 ! -name '.git' ! -name '.github' -exec rm -rf {} +
          cp -r /tmp/server-backup/* ./
      
      - name: Commit and Push to GitHub
        if: false
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          
          if [[ -n $(git status -s) ]]; then
            git add .
            git commit -m "Sync from IONOS server via FTP [$(date +'%Y-%m-%d %H:%M:%S')]"
            git push origin main
          else
            echo "Keine Änderungen"
          fi
