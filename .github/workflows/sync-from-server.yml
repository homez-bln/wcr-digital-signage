name: Sync from IONOS Server

# Manuell ausführbar über GitHub UI (Actions Tab)
on:
  workflow_dispatch:

jobs:
  sync-from-server:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.IONOS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Debug: SSH Key prüfen (ohne private Daten zu zeigen)
          echo "SSH Key first line:"
          head -n 1 ~/.ssh/id_rsa
          echo "SSH Key line count: $(wc -l < ~/.ssh/id_rsa)"
          
          # Host zu known_hosts hinzufügen
          ssh-keyscan -H ${{ secrets.IONOS_HOST }} >> ~/.ssh/known_hosts 2>&1
      
      - name: Test SSH Connection
        run: |
          echo "Testing SSH connection to ${{ secrets.IONOS_USER }}@${{ secrets.IONOS_HOST }}..."
          ssh -v -o StrictHostKeyChecking=no \
            ${{ secrets.IONOS_USER }}@${{ secrets.IONOS_HOST }} \
            "echo 'SSH connection successful!' && pwd" 2>&1
      
      - name: Pull Code from IONOS Server
        run: |
          echo "Syncing from: ${{ secrets.IONOS_USER }}@${{ secrets.IONOS_HOST }}:${{ secrets.IONOS_PATH }}/"
          
          # Lokale Änderungen verwerfen
          git reset --hard HEAD
          
          # Code vom Server per rsync holen
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='wp-content/uploads' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ${{ secrets.IONOS_USER }}@${{ secrets.IONOS_HOST }}:${{ secrets.IONOS_PATH }}/ \
            ./ 2>&1
      
      - name: Commit and Push to GitHub
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          
          if [[ -n $(git status -s) ]]; then
            git add .
            git commit -m "Sync from IONOS server [$(date +'%Y-%m-%d %H:%M:%S')]"
            git push origin main
          else
            echo "Keine Änderungen vom Server"
          fi
