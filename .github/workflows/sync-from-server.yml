name: Sync from IONOS Server (FTP)

# Manuell ausführbar über GitHub UI (Actions Tab)
on:
  workflow_dispatch:

jobs:
  sync-from-server:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp
      
      - name: Download from FTP Server
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          IONOS_HOST: ${{ secrets.IONOS_HOST }}
        run: |
          # Temporäres Verzeichnis für Download
          mkdir -p /tmp/server-backup
          
          echo "Connecting to FTP server..."
          
          # lftp für rekursiven Download mit Mirror
          lftp -e "
            set ssl:verify-certificate no;
            set ftp:ssl-allow yes;
            set ftp:ssl-force yes;
            open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER;
            mirror --verbose \
              --exclude .git/ \
              --exclude .github/ \
              --exclude node_modules/ \
              --exclude wp-content/uploads/ \
              --exclude .env \
              /wcr-digital-signage /tmp/server-backup;
            bye
          "
          
          echo "Download completed. Files in /tmp/server-backup:"
          ls -la /tmp/server-backup
      
      - name: Sync to Repository
        run: |
          # Lokale Änderungen verwerfen
          git reset --hard HEAD
          
          # Alte Dateien löschen (außer .git und .github)
          find . -mindepth 1 -maxdepth 1 ! -name '.git' ! -name '.github' -exec rm -rf {} +
          
          # Neue Dateien kopieren
          cp -r /tmp/server-backup/* ./
          
          echo "Files synced. Repository content:"
          ls -la
      
      - name: Commit and Push to GitHub
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          
          if [[ -n $(git status -s) ]]; then
            git add .
            git commit -m "Sync from IONOS server via FTP [$(date +'%Y-%m-%d %H:%M:%S')]"
            git push origin main
            echo "✅ Changes pushed to GitHub"
          else
            echo "ℹ️ Keine Änderungen vom Server"
          fi
