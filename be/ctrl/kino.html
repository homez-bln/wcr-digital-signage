<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 WCR Kino Control</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            color: #e0e0e0;
            padding: 40px 20px;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #ffd700;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.3);
        }
        .subtitle {
            font-size: 1rem;
            color: #a0a0b0;
            margin-bottom: 40px;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        .btn-danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }
        .btn-danger:hover {
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.6);
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #ffd700;
        }
        input[type="text"],
        input[type="url"],
        input[type="date"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
        .films-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        .film-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
        }
        .film-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .film-cover {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-bottom: 2px solid rgba(255, 215, 0, 0.3);
        }
        .film-info {
            padding: 20px;
        }
        .film-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #fff;
        }
        .film-date {
            font-size: 0.95rem;
            color: #ffd700;
            margin-bottom: 15px;
        }
        .film-actions {
            display: flex;
            gap: 10px;
        }
        .film-actions .btn {
            flex: 1;
            padding: 8px;
            font-size: 0.85rem;
        }
        .badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 215, 0, 0.9);
            color: #1e1e2e;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .badge.past {
            background: rgba(200, 50, 50, 0.9);
            color: #fff;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #7a8a8a;
            font-size: 1.2rem;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #10b981;
            color: #fff;
            padding: 16px 24px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        .toast.error {
            background: #ef4444;
        }
        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Kino-Programm</h1>
        <p class="subtitle">Verwalte das Open-Air-Kino-Programm — Filme, Cover, Spieltage</p>

        <!-- Neuen Film hinzufügen -->
        <div class="card">
            <h2 style="margin-bottom:20px;color:#ffd700;">Neuer Film</h2>
            <form id="addFilmForm">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
                    <div class="form-group">
                        <label>Filmtitel *</label>
                        <input type="text" id="filmTitle" required placeholder="z.B. Inception">
                    </div>
                    <div class="form-group">
                        <label>Cover-URL *</label>
                        <input type="url" id="filmCover" required placeholder="https://example.com/poster.jpg">
                    </div>
                    <div class="form-group">
                        <label>Spieltag *</label>
                        <input type="date" id="filmDate" required>
                    </div>
                    <div class="form-group">
                        <label>Sortierung</label>
                        <input type="number" id="filmSort" value="0" placeholder="0 = zuerst">
                    </div>
                </div>
                <button type="submit" class="btn">➕ Film hinzufügen</button>
            </form>
        </div>

        <!-- Film-Liste -->
        <div class="card">
            <h2 style="margin-bottom:20px;color:#ffd700;">Alle Filme (<span id="filmCount">0</span>)</h2>
            <div id="filmsGrid" class="films-grid">
                <div class="empty-state">🎬 Keine Filme geladen...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://wcr-webpage.de/wp-admin/admin-ajax.php';
        const SECRET = 'WCR_DS_2026';

        // Toast-Benachrichtigung
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Filme laden
        async function loadFilms() {
            try {
                const res = await fetch(API_BASE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        action: 'wcr_kino_list',
                        wcr_secret: SECRET
                    })
                });
                const data = await res.json();
                if (data.success && Array.isArray(data.data)) {
                    renderFilms(data.data);
                } else {
                    throw new Error('Ungültige Antwort');
                }
            } catch (err) {
                console.error('Fehler beim Laden:', err);
                showToast('❌ Fehler beim Laden der Filme', 'error');
            }
        }

        // Filme rendern
        function renderFilms(films) {
            const grid = document.getElementById('filmsGrid');
            document.getElementById('filmCount').textContent = films.length;

            if (films.length === 0) {
                grid.innerHTML = '<div class="empty-state">🎬 Noch keine Filme hinzugefügt</div>';
                return;
            }

            const today = new Date().toISOString().split('T')[0];

            grid.innerHTML = films.map(film => {
                const isPast = film.date < today;
                const badge = film.date === today ? 'Heute' : (isPast ? 'Gelaufen' : 'Kommend');
                const badgeClass = isPast ? 'past' : '';

                return `
                    <div class="film-card">
                        <span class="badge ${badgeClass}">${badge}</span>
                        <img src="${film.cover_url}" alt="${film.title}" class="film-cover" onerror="this.src='https://via.placeholder.com/300x450?text=Kein+Cover'">
                        <div class="film-info">
                            <div class="film-title">${film.title}</div>
                            <div class="film-date">📅 ${formatDate(film.date)}</div>
                            <div class="film-actions">
                                <button class="btn" onclick="editFilm(${film.id})">Bearbeiten</button>
                                <button class="btn btn-danger" onclick="deleteFilm(${film.id}, '${film.title}')">Löschen</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Datum formatieren
        function formatDate(dateStr) {
            const [y, m, d] = dateStr.split('-');
            return `${d}.${m}.${y}`;
        }

        // Film hinzufügen
        document.getElementById('addFilmForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('filmTitle').value.trim();
            const cover = document.getElementById('filmCover').value.trim();
            const date = document.getElementById('filmDate').value;
            const sort = document.getElementById('filmSort').value;

            try {
                const res = await fetch(API_BASE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        action: 'wcr_kino_add',
                        wcr_secret: SECRET,
                        title, cover_url: cover, date, sort_order: sort
                    })
                });
                const data = await res.json();
                if (data.success) {
                    showToast('✅ Film erfolgreich hinzugefügt!');
                    e.target.reset();
                    loadFilms();
                } else {
                    throw new Error(data.data || 'Fehler');
                }
            } catch (err) {
                console.error('Fehler:', err);
                showToast('❌ Fehler beim Hinzufügen', 'error');
            }
        });

        // Film löschen
        async function deleteFilm(id, title) {
            if (!confirm(`Film "${title}" wirklich löschen?`)) return;
            try {
                const res = await fetch(API_BASE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        action: 'wcr_kino_delete',
                        wcr_secret: SECRET,
                        id
                    })
                });
                const data = await res.json();
                if (data.success) {
                    showToast('✅ Film gelöscht!');
                    loadFilms();
                } else {
                    throw new Error(data.data || 'Fehler');
                }
            } catch (err) {
                console.error('Fehler:', err);
                showToast('❌ Fehler beim Löschen', 'error');
            }
        }

        // Film bearbeiten (Platzhalter für später)
        function editFilm(id) {
            showToast('⚠️ Bearbeiten noch nicht implementiert', 'error');
            // TODO: Modal mit Formular zum Bearbeiten
        }

        // Init
        loadFilms();
    </script>
</body>
</html>
